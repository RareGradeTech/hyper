<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#059669">
<title>1BUSKET | Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#f9fafb; --surface:#ffffff; --surface2:#f3f4f6;
  --border:#e5e7eb; --border-light:#f3f4f6;
  --text:#111827; --text-secondary:#4b5563; --dim:#6b7280;
  --accent:#059669; --accent-dark:#047857; --accent-light:#d1fae5;
  --yellow:#f59e0b; --danger:#ef4444;
  --radius:24px; --radius-sm:16px; --radius-xs:12px; --radius-pill:100px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05); --shadow:0 4px 12px rgba(0,0,0,0.05); --shadow-lg:0 10px 40px rgba(0,0,0,0.12);
  --tr:all .3s cubic-bezier(.4,0,.2,1); --header-h:72px; --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{touch-action:manipulation;scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.noscroll{scrollbar-width:none;-ms-overflow-style:none} .noscroll::-webkit-scrollbar{display:none}

/* ── LAYOUT SHELL ── */
.app-container { width: 100%; min-height: 100vh; position: relative; background: var(--bg); transition: padding-left 0.3s ease; }
.page-content { padding-bottom: calc(80px + var(--safe)); }

/* ── MOBILE HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; height: var(--header-h); background: var(--surface);
  position: sticky; top: 0; z-index: 900; border-bottom: 1px solid var(--border-light);
}
.header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.logo-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.delivery-info { display: flex; flex-direction: column; cursor: pointer; }
.delivery-label { font-size: 0.65rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.delivery-address { font-size: 0.95rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 4px; }
.header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── AUTH & PROFILE UI ── */
.auth-container { position: relative; }
.google-signin-btn {
  display: flex; align-items: center; gap: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-pill);
  padding: 8px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
  color: var(--text); transition: var(--tr); box-shadow: var(--shadow-sm);
}
.google-signin-btn:hover { background: var(--surface2); border-color: var(--dim); }
.google-signin-btn img { width: 16px; height: 16px; }
@media (max-width: 480px) { .btn-text-hide { display: none; } }

.profile-avatar {
  width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; object-fit: cover; background: var(--surface2); transition: var(--tr);
}
.profile-avatar:hover { border-color: var(--accent); transform: scale(1.05); }

.profile-menu {
  position: absolute; top: calc(100% + 12px); right: 0;
  background: var(--surface); border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
  width: 220px; padding: 8px; opacity: 0; visibility: hidden;
  transform: translateY(-10px); transition: var(--tr); z-index: 2100;
}
.profile-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.profile-menu-header { padding: 8px 12px; border-bottom: 1px solid var(--border-light); margin-bottom: 4px; }
.profile-menu-name { font-weight: 800; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.profile-menu-email { font-size: 0.75rem; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.profile-menu-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
  border-radius: var(--radius-xs); cursor: pointer; transition: var(--tr);
}
.profile-menu-item:hover { background: var(--accent-light); color: var(--accent-dark); }
.profile-menu-item i { width: 16px; height: 16px; }

/* ── CART BUTTON ── */
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: var(--text); transition: var(--tr); position: relative;
}
.icon-btn:hover { background: var(--border); }
.cart-badge { position: absolute; top: -2px; right: -2px; background: var(--accent); color: white; font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 12px; border: 2px solid var(--surface); }

/* ── DESKTOP SIDEBAR (Full Height) ── */
.desktop-sidebar {
  position: fixed; top: 0; left: 0; height: 100vh; width: 72px;
  background: var(--surface); border-right: 1px solid var(--border-light);
  box-shadow: 4px 0 16px rgba(0,0,0,0.03); z-index: 2000;
  display: none; flex-direction: column; padding: 24px 0; gap: 12px;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; white-space: nowrap;
}
.desktop-sidebar:hover { width: 220px; box-shadow: var(--shadow-lg); }
.sidebar-logo {
  display: flex; align-items: center; gap: 16px; padding: 0 16px; margin-bottom: 24px;
}
.sidebar-logo img { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
.sidebar-logo-text { font-weight: 900; font-size: 1.1rem; color: var(--accent); opacity: 0; transition: opacity 0.2s ease; }
.desktop-sidebar:hover .sidebar-logo-text { opacity: 1; transition-delay: 0.1s; }

.sidebar-item {
  display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  color: var(--dim); cursor: pointer; transition: var(--tr); font-weight: 700; font-size: 0.95rem;
  border-left: 3px solid transparent;
}
.sidebar-item:hover, .sidebar-item.active { color: var(--accent); background: var(--accent-light); border-left-color: var(--accent); }
.sidebar-item i { width: 24px; height: 24px; flex-shrink: 0; }
.sidebar-label { opacity: 0; transition: opacity 0.2s ease; }
.desktop-sidebar:hover .sidebar-label { opacity: 1; transition-delay: 0.1s; }

.cart-icon-wrap { position: relative; display: flex; align-items: center; }
.sidebar-cart-badge {
  position: absolute; top: -6px; right: -8px; background: var(--danger); color: white;
  font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 12px;
  border: 2px solid var(--surface); display: none;
}

/* ── RESPONSIVENESS ── */
@media (min-width: 768px) {
  .app-container { padding-left: 72px; } /* Room for full height sidebar */
  .page-content { padding-bottom: 32px; max-width: 1400px; margin: 0 auto; }
  .bottom-nav { display: none !important; }
  .desktop-sidebar { display: flex; }
  /* Adjust header to sit flush beside the sidebar */
  .header { border-radius: 0; border: none; border-bottom: 1px solid var(--border-light); margin-bottom: 24px;}
  .header .logo-wrap { display: none; } /* Hidden in header, shown in sidebar */
  .products-row { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); overflow-x: visible !important; }
  .cat-scroll { flex-wrap: wrap; justify-content: flex-start; }
}

/* ── SEARCH BAR ── */
.search-section { padding: 0 16px 16px; position: sticky; top: var(--header-h); background: var(--bg); z-index: 899; }
@media (min-width: 768px) { .search-section { top: 16px; background: transparent; padding: 0; margin-bottom: 24px; } }
.search-box {
  display: flex; align-items: center; gap: 10px; background: var(--surface);
  border-radius: var(--radius-pill); padding: 14px 20px; transition: var(--tr);
  box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
}
.search-box:focus-within { box-shadow: 0 0 0 2px var(--accent-light); border-color: var(--accent); }
.search-box input { flex: 1; border: none; background: transparent; font-family: inherit; font-size: 0.95rem; font-weight: 500; outline: none; color: var(--text); }
.search-box input::placeholder { color: var(--dim); }

/* ── HERO BANNER (Animated Carousel) ── */
.hero-wrapper { padding: 0 16px 24px; }
@media (min-width: 768px) { .hero-wrapper { padding: 0 0 32px 0; } }
.hero-carousel {
  position: relative; width: 100%; height: 220px; border-radius: var(--radius);
  overflow: hidden; background: var(--surface2); box-shadow: var(--shadow);
}
@media (min-width: 768px) { .hero-carousel { height: 300px; } }
.hero-slide {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 0.8s ease, transform 4s ease; transform: scale(1.05);
}
.hero-slide.active { opacity: 1; transform: scale(1); z-index: 1; }
.hero-overlay {
  position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 100%);
  z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 32px;
}
.hero-overlay h2 { color: white; font-size: 1.8rem; font-weight: 900; line-height: 1.2; margin-bottom: 8px; max-width: 80%; }
.hero-overlay p { color: rgba(255,255,255,0.9); font-size: 0.95rem; font-weight: 500; }

/* ── CATEGORIES ── */
.section { padding: 0 16px 32px; }
@media (min-width: 768px) { .section { padding: 0 0 40px 0; } }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 1.25rem; font-weight: 800; color: var(--text); }
.cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
.cat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 76px; cursor: pointer; }
.cat-icon {
  width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
  background: var(--surface); color: var(--dim); transition: var(--tr); box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
}
.cat-icon i { width: 26px; height: 26px; stroke-width: 1.5; }
.cat-item:hover .cat-icon { transform: translateY(-4px); box-shadow: var(--shadow); }
.cat-item.active .cat-icon { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 8px 16px rgba(5,150,105,0.3); }
.cat-label { font-size: 0.8rem; font-weight: 600; text-align: center; color: var(--text); }

/* ── PRODUCT CARDS ── */
.products-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
@media (min-width: 768px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; } }
.product-card {
  flex: 0 0 160px; display: flex; flex-direction: column; cursor: pointer; scroll-snap-align: start;
  background: var(--surface); padding: 12px; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
  transition: var(--tr);
}
.product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent-light); }
.pc-img-wrap {
  width: 100%; aspect-ratio: 1; border-radius: var(--radius-xs); overflow: hidden;
  background: var(--surface2); position: relative; margin-bottom: 12px;
}
.pc-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
.product-card:hover .pc-img-wrap img { transform: scale(1.05); }
.pc-no-img { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--dim); opacity: 0.5; }
.pc-badge { position: absolute; top: 8px; left: 8px; background: var(--surface); color: var(--text); font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 100px; box-shadow: var(--shadow); }
.pc-badge.promo { background: var(--accent-light); color: var(--accent-dark); }
.pc-info { display: flex; flex-direction: column; flex: 1; }
.pc-price { font-size: 1.1rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pc-price-old { font-size: 0.8rem; color: var(--dim); text-decoration: line-through; font-weight: 500; }
.pc-name { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
.pc-action { margin-top: auto; }
.add-btn {
  width: 100%; padding: 10px; border-radius: var(--radius-pill); background: var(--accent-light); color: var(--accent-dark);
  border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: var(--tr); display: flex; align-items: center; justify-content: center; gap: 4px;
}
.add-btn:hover { background: var(--accent); color: white; }
.add-btn:active { transform: scale(0.96); }
.qty-ctrl {
  display: flex; align-items: center; justify-content: space-between; background: var(--accent); color: white;
  border-radius: var(--radius-pill); padding: 6px; box-shadow: 0 4px 12px rgba(5,150,105,0.2);
}
.qty-ctrl button { width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--tr);}
.qty-ctrl button:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
.qty-num { font-weight: 800; font-size: 0.9rem; }

/* ── SLIDE-IN CART DRAWER ── */
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; opacity: 0; visibility: hidden; transition: var(--tr); backdrop-filter: blur(2px); }
.cart-overlay.open { opacity: 1; visibility: visible; }
.cart-drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 400px; background: var(--surface);
  z-index: 3001; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
  display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
}
.cart-drawer.open { transform: translateX(0); }
.cart-header { padding: 20px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
.cart-header h3 { font-weight: 900; font-size: 1.2rem; }
.close-cart-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dim); transition: var(--tr); }
.close-cart-btn:hover { background: var(--border); transform: rotate(90deg); }
.cart-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--dim); opacity: 0.6; }
.cart-empty i { width: 64px; height: 64px; margin-bottom: 16px; }
.cart-item-row { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
.cart-item-img { width: 60px; height: 60px; border-radius: var(--radius-xs); object-fit: cover; background: var(--surface2); }
.cart-item-info { flex: 1; display: flex; flex-direction: column; }
.cart-item-name { font-weight: 700; font-size: 0.9rem; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2;}
.cart-item-price { font-size: 0.85rem; color: var(--dim); margin-top: 4px; }
.cart-item-total { font-weight: 800; font-size: 1rem; color: var(--text); }
.cart-qty-mini { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: var(--radius-pill); padding: 4px; margin-top: 8px; width: fit-content;}
.cart-qty-mini button { width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--surface); cursor: pointer; box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; }
.cart-qty-mini span { font-weight: 700; font-size: 0.85rem; min-width: 20px; text-align: center; }

.cart-footer { padding: 20px; border-top: 1px solid var(--border-light); background: var(--surface); }
.cart-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: var(--dim); font-weight: 500; }
.cart-summary-row.total { font-size: 1.2rem; font-weight: 900; color: var(--text); margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
.checkout-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: var(--radius-pill); font-weight: 800; font-size: 1rem; cursor: pointer; transition: var(--tr); margin-top: 16px; box-shadow: 0 4px 16px rgba(5,150,105,0.3); }
.checkout-btn:hover { background: var(--accent-dark); transform: translateY(-2px); }
.checkout-btn:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; box-shadow: none; transform: none; }

/* ── MOBILE BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  display: flex; justify-content: space-around; align-items: center;
  padding: 12px 10px calc(12px + var(--safe)); border-top: 1px solid var(--border-light); z-index: 1000;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--dim); text-decoration: none; font-size: 0.65rem; font-weight: 700; cursor: pointer; position: relative; transition: var(--tr);
}
.nav-item.active { color: var(--accent); }
.nav-item i { width: 24px; height: 24px; }
.nav-badge {
  position: absolute; top: -4px; right: -6px; background: var(--danger); color: white;
  font-size: 0.65rem; padding: 2px 6px; border-radius: 100px; font-weight: 800; border: 2px solid var(--surface); display: none;
}

/* ── TOAST ── */
#toast { position: fixed; bottom: calc(80px + var(--safe)); left: 50%; transform: translateX(-50%) translateY(100px); background: #111827; color: white; padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 0.85rem; z-index: 9999; transition: var(--tr); box-shadow: var(--shadow-lg); opacity: 0; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

  try { await signOut(auth); window.closeProfileMenu(); } catch(e) {}
};

window.toggleProfileMenu = (e) => {
  e.stopPropagation();
  const menu = document.getElementById('profileMenu');
  if(menu) menu.classList.toggle('show');
};

window.closeProfileMenu = () => {
  const menu = document.getElementById('profileMenu');
  if(menu) menu.classList.remove('show');
};

document.addEventListener('click', (e) => {
  const authCont = document.getElementById('authContainer');
  if(authCont && !authCont.contains(e.target)) {
     closeProfileMenu();
  }
});

/* ── CAROUSEL ── */
setInterval(() => {
  const slides = document.querySelectorAll('.hero-slide');
  if(!slides.length) return;
  const active = document.querySelector('.hero-slide.active');
  if(active) active.classList.remove('active');
  const next = active?.nextElementSibling || slides[0];
  if(next) next.classList.add('active');
}, 4000);

/* ── CATEGORIES ── */
const CATS = [
  { key:'all', label:'All', icon:'layout-grid' },
  { key:'fresh', label:'Produce', icon:'leaf' },
  { key:'dairy', label:'Dairy', icon:'milk' },
  { key:'meat', label:'Meat', icon:'drumstick' },
  { key:'bakery', label:'Bakery', icon:'croissant' },
  { key:'beverages', label:'Drinks', icon:'cup-soda' },
  { key:'snacks', label:'Snacks', icon:'cookie' },
  { key:'frozen', label:'Frozen', icon:'snowflake' },
  { key:'pantry', label:'Pantry', icon:'archive' },
  { key:'household', label:'Home', icon:'spray-can' }
];

const CAT_MAP = {'Fruits & Veg':'fresh', 'Dairy':'dairy', 'Meat':'meat', 'Bakery':'bakery', 'Frozen':'frozen', 'Pantry':'pantry', 'Snacks':'snacks', 'Beverages':'beverages', 'Household':'household'};
function getCatKey(c){ return CAT_MAP[c] || 'pantry'; }

let allProducts = [], cartGroups = {}, activeCat = 'all', currentUser = null, currentUserId = null;

window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

/* ── LOAD DATA ── */
onValue(ref(db,'vendors'), snap=>{
  allProducts = [];
  const data = snap.val();
  if(!data) return;
  Object.entries(data).forEach(([vid,v])=>{
    if((v.storeType||'').toLowerCase() !== 'grocery' || v.status !== 'active' || !v.menu) return;
    Object.entries(v.menu).forEach(([pid, item])=>{
      allProducts.push({
        id: `${vid}_${pid}`, vendorId: vid, vendorName: v.name,
        name: item.name, price: parseFloat(item.price||0),
        originalPrice: item.originalPrice ? parseFloat(item.originalPrice) : null,
        category: item.category || 'Other', imageURL: item.imageURL || '',
        description: item.description || '', status: item.status || 'available',
        featured: item.featured === true || item.featured === 'true'
      });
    });
  });
  renderUI();
});

function renderUI() {
  // Build Cat Bar
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(c => `
    <div class="cat-item ${activeCat===c.key?'active':''}" onclick="selectCat('${c.key}')">
      <div class="cat-icon"><i data-lucide="${c.icon}"></i></div>
      <span class="cat-label">${c.label}</span>
    </div>
  `).join('');
  
  renderAisles(activeCat);
  renderPopular();
  lucide.createIcons();
}

window.selectCat = (key) => {
  activeCat = key;
  document.getElementById('searchSection2').style.display = 'none';
  document.getElementById('aisleContainer').style.display = '';
  
  // Hide Hero banner if filtering a specific category
  const hero = document.getElementById('heroWrapper');
  const popular = document.getElementById('popularSection');
  if (key === 'all') {
      hero.style.display = 'block';
      popular.style.display = 'block';
  } else {
      hero.style.display = 'none';
      popular.style.display = 'none';
  }

  renderUI();
  window.scrollTo({top:0, behavior:'smooth'});
};

function renderPopular() {
  if(activeCat !== 'all') return;
  const featured = allProducts.filter(p=>p.featured).slice(0,10);
  document.getElementById('popularSection').style.display = featured.length ? 'block' : 'none';
  const row = document.getElementById('popularRow');
  if(row) row.innerHTML = featured.map(p=>buildCardHTML(p)).join('');
}

function renderAisles(catKey) {
  const cont = document.getElementById('aisleContainer');
  let filtered = catKey === 'all' ? allProducts : allProducts.filter(p=>getCatKey(p.category)===catKey);
  
  if(catKey === 'all') {
    const groups = {};
    filtered.forEach(p=>{ const k=getCatKey(p.category); if(!groups[k]) groups[k]=[]; groups[k].push(p); });
    cont.innerHTML = CATS.filter(c=>c.key!=='all' && groups[c.key]).map(cat => `
      <div class="section">
        <div class="section-header"><div class="section-title">${cat.label}</div><button class="section-link" style="color:var(--accent);font-weight:700;background:none;border:none;cursor:pointer;" onclick="selectCat('${cat.key}')">See all</button></div>
        <div class="products-row noscroll">${groups[cat.key].slice(0,8).map(p=>buildCardHTML(p)).join('')}</div>
      </div>
    `).join('');
  } else {
    cont.innerHTML = `
      <div class="section" style="padding-top:24px;">
        <div class="section-header"><div class="section-title">${CATS.find(c=>c.key===catKey).label}</div></div>
        <div class="products-grid">${filtered.map(p=>buildCardHTML(p)).join('')}</div>
      </div>`;
  }
}

function buildCardHTML(product) {
  const qty = getProductQuantity(product.id);
  const img = product.imageURL ? `<img src="${product.imageURL}" loading="lazy">` : `<div class="pc-no-img"><i data-lucide="image"></i></div>`;
  const badge = product.featured ? `<div class="pc-badge promo">Popular</div>` : '';
  const oldP = product.originalPrice ? `<span class="pc-price-old">R${product.originalPrice.toFixed(2)}</span>` : '';
  
  let actionHtml = `<button class="add-btn" onclick="event.stopPropagation(); addItem('${product.id}')"><i data-lucide="plus" style="width:16px;"></i> Add</button>`;
  if(qty > 0) {
    actionHtml = `<div class="qty-ctrl">
      <button onclick="event.stopPropagation(); updateItemQty('${product.id}', -1)"><i data-lucide="minus" style="width:14px;"></i></button>
      <span class="qty-num">${qty}</span>
      <button onclick="event.stopPropagation(); updateItemQty('${product.id}', 1)"><i data-lucide="plus" style="width:14px;"></i></button>
    </div>`;
  }

  return `
    <div class="product-card">
      <div class="pc-img-wrap">${img}${badge}</div>
      <div class="pc-info">
        <div class="pc-price">R${product.price.toFixed(2)} ${oldP}</div>
        <div class="pc-name">${product.name}</div>
        <div class="pc-action" id="act-${product.id}">${actionHtml}</div>
      </div>
    </div>`;
}

/* ── CART LOGIC ── */
function getProductQuantity(id) {
  for(const g of Object.values(cartGroups)) {
    const i = g.items.find(x=>x.id===id); if(i) return i.quantity;
  } return 0;
}

window.addItem = (id) => {
  const p = allProducts.find(x=>x.id===id); if(!p) return;
  if(!cartGroups[p.vendorId]) cartGroups[p.vendorId] = { vendorId: p.vendorId, items: [] };
  cartGroups[p.vendorId].items.push({...p, quantity: 1});
  saveCart(); updateCartState(); showToast("Added to basket");
};

window.updateItemQty = (id, delta) => {
  for(const vid in cartGroups) {
    const idx = cartGroups[vid].items.findIndex(x=>x.id===id);
    if(idx !== -1) {
      cartGroups[vid].items[idx].quantity += delta;
      if(cartGroups[vid].items[idx].quantity <= 0) cartGroups[vid].items.splice(idx, 1);
      if(cartGroups[vid].items.length === 0) delete cartGroups[vid];
      break;
    }
  }
  saveCart(); updateCartState();
};

async function saveCart() {
  if(!currentUserId) return;
  try { await set(ref(db,`carts/${currentUserId}`), {groups: JSON.parse(JSON.stringify(cartGroups)), updatedAt: Date.now()}); } catch(e){}
}

function updateCartState() {
  const totalItems = Object.values(cartGroups).reduce((s,g)=>s+g.items.reduce((ss,i)=>ss+i.quantity,0),0);
  const totalPrice = Object.values(cartGroups).reduce((s,g)=>s+g.items.reduce((ss,i)=>ss+(i.price*i.quantity),0),0);
  
  // Badges
  const mobileBadge = document.getElementById('navCartBadge');
  const desktopBadge = document.getElementById('desktopSidebarBadge');
  const topMobileBadge = document.getElementById('mobileTopCartBadge');
  
  if(totalItems > 0) {
    mobileBadge.style.display = 'block'; mobileBadge.textContent = totalItems;
    desktopBadge.style.display = 'block'; desktopBadge.textContent = totalItems;
    if(topMobileBadge) { topMobileBadge.style.display = 'block'; topMobileBadge.textContent = totalItems; }
  } else {
    mobileBadge.style.display = 'none'; desktopBadge.style.display = 'none';
    if(topMobileBadge) topMobileBadge.style.display = 'none';
  }

  // Cart Drawer UI
  const body = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  const summary = document.getElementById('cartSummary');

  if(totalItems === 0) {
    body.innerHTML = `<div class="cart-empty"><i data-lucide="shopping-bag"></i><h2>Basket is empty</h2><p>Add some items to get started.</p></div>`;
    footer.style.display = 'none';
  } else {
    footer.style.display = 'block';
    let html = '';
    Object.values(cartGroups).forEach(group => {
      group.items.forEach(item => {
        const img = item.imageURL ? `<img class="cart-item-img" src="${item.imageURL}">` : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;"><i data-lucide="image"></i></div>`;
        html += `
        <div class="cart-item-row">
          ${img}
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">R${item.price.toFixed(2)}</div>
            <div class="cart-qty-mini">
              <button onclick="updateItemQty('${item.id}', -1)"><i data-lucide="minus" style="width:12px;"></i></button>
              <span>${item.quantity}</span>
              <button onclick="updateItemQty('${item.id}', 1)"><i data-lucide="plus" style="width:12px;"></i></button>
            </div>
          </div>
          <div class="cart-item-total">R${(item.price * item.quantity).toFixed(2)}</div>
        </div>`;
      });
    });
    body.innerHTML = html;
    summary.innerHTML = `
      <div class="cart-summary-row"><span>Subtotal (${totalItems} items)</span><span>R ${totalPrice.toFixed(2)}</span></div>
      <div class="cart-summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
      <div class="cart-summary-row total"><span>Total</span><span>R ${totalPrice.toFixed(2)}</span></div>
    `;
  }
  
  renderUI(); 
}

window.toggleCart = () => {
  const drawer = document.getElementById('cartDrawer');
  const overlay = document.getElementById('cartOverlay');
  if(drawer.classList.contains('open')) {
    drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';
  } else {
    drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden';
    updateCartState();
  }
};

window.goToPaymentPage = function() {
  const totalItems = Object.values(cartGroups).reduce((s,g)=>s+g.items.reduce((ss,i)=>ss+i.quantity,0),0);
  if(totalItems === 0) return;
  if(!currentUserId) { showToast("Please sign in to continue"); toggleCart(); return; }
  
  localStorage.setItem('checkoutCartGroups', JSON.stringify(cartGroups));
  localStorage.setItem('checkoutTotalItems', totalItems.toString());
  localStorage.setItem('checkoutUserId', currentUserId);
  window.location.href = 'payment.html';
};

/* ── NAV & SEARCH ACTIONS ── */
window.goHome = () => { selectCat('all'); };
window.focusSearch = () => { document.getElementById('searchInput').focus(); window.scrollTo({top:0}); };

window.handleSearch = (q) => {
  const query = q.trim().toLowerCase();
  if(!query) { selectCat(activeCat); return; }
  
  const res = allProducts.filter(p=>p.name.toLowerCase().includes(query) || (p.brand||'').toLowerCase().includes(query));
  
  document.getElementById('heroWrapper').style.display = 'none';
  document.getElementById('aisleContainer').style.display = 'none';
  document.getElementById('catSection').style.display = 'none';
  document.getElementById('popularSection').style.display = 'none';
  
  const sec2 = document.getElementById('searchSection2');
  sec2.style.display = 'block';
  document.getElementById('searchTitle').innerHTML = `Results for "${q}"`;
  
  const grid = document.getElementById('searchGrid');
  if(res.length) {
    grid.innerHTML = res.map(p=>buildCardHTML(p)).join('');
  } else {
    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px 20px; color: var(--dim);"><i data-lucide="search-x" style="width:48px;height:48px;margin-bottom:10px;"></i><h3>Nothing found</h3></div>`;
  }
  lucide.createIcons();
};

/* ── AUTH SYNC ── */
onAuthStateChanged(auth, u => {
  currentUser = u; currentUserId = u?.uid || null;
  const authContainer = document.getElementById('authContainer');
  
  if (u) {
    const avatarUrl = u.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.uid}`;
    authContainer.innerHTML = `
      <img src="${avatarUrl}" class="profile-avatar" onclick="toggleProfileMenu(event)" alt="Profile">
      <div class="profile-menu" id="profileMenu">
        <div class="profile-menu-header">
          <div class="profile-menu-name">${u.displayName || 'User'}</div>
          <div class="profile-menu-email">${u.email}</div>
        </div>
        <div class="profile-menu-item"><i data-lucide="package"></i> Orders</div>
        <div class="profile-menu-item"><i data-lucide="settings"></i> Settings</div>
        <div class="profile-menu-item" onclick="signOutUser()" style="color:var(--danger);"><i data-lucide="log-out"></i> Sign Out</div>
      </div>
    `;
    onValue(ref(db, `carts/${currentUserId}`), snap=>{
      cartGroups = snap.exists() ? snap.val().groups || {} : {};
      updateCartState();
    });
  } else {
    authContainer.innerHTML = `
      <button class="google-signin-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
        <span class="btn-text-hide">Sign In</span>
      </button>
    `;
    cartGroups = {}; updateCartState();
  }
  lucide.createIcons();
});

// Adjust UI for Mobile vs Desktop
if(window.innerWidth <= 768) {
  const btn = document.getElementById('mobileCartBtn');
  if(btn) btn.style.display = 'flex';
}

lucide.createIcons();
</script>
</body>
</html>
