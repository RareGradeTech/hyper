<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#059669">
<title>1BUSKET | Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#f9fafb; --surface:#ffffff; --surface2:#f3f4f6;
  --border:#e5e7eb; --border-light:#f3f4f6;
  --text:#111827; --text-secondary:#4b5563; --dim:#6b7280;
  --accent:#059669; --accent-dark:#047857; --accent-light:#d1fae5;
  --yellow:#f59e0b; --danger:#ef4444;
  --radius:24px; --radius-sm:16px; --radius-xs:12px; --radius-pill:100px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05); --shadow:0 4px 12px rgba(0,0,0,0.05); --shadow-lg:0 10px 30px rgba(0,0,0,0.08);
  --tr:all .2s ease-out; --header-h:72px; --safe:env(safe-area-inset-bottom,0px);
  --max-w: 1200px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{touch-action:manipulation;scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;}
.noscroll{scrollbar-width:none;-ms-overflow-style:none} .noscroll::-webkit-scrollbar{display:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── LAYOUT SHELL ── */
.app-container { max-width: var(--max-w); margin: 0 auto; background: var(--surface); min-height: 100vh; position: relative; box-shadow: var(--shadow-lg); }
.page-content { padding-bottom: calc(80px + var(--safe)); }

/* ── HEADER (Bolt Style Address Selector) ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; height: var(--header-h); background: var(--surface);
  position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-light);
}
.header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.logo-wrap { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; background: var(--surface2); flex-shrink: 0; }
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.delivery-info { display: flex; flex-direction: column; cursor: pointer; }
.delivery-label { font-size: 0.65rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.delivery-address { font-size: 0.95rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 4px; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: var(--text); transition: var(--tr); position: relative;
}
.icon-btn:hover { background: var(--border); }
.cart-badge { position: absolute; top: -2px; right: -2px; background: var(--accent); color: white; font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 12px; border: 2px solid var(--surface); }

/* ── DESKTOP & MOBILE RESPONSIVENESS ── */
@media (min-width: 768px) {
  .page-content { padding-bottom: 20px; }
  .bottom-nav { display: none !important; }
  .header { padding: 12px 32px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .section { padding: 32px 32px 0 !important; }
  .products-row { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); overflow-x: visible !important; }
  .cat-scroll { flex-wrap: wrap; justify-content: flex-start; }
}

/* ── SEARCH BAR ── */
.search-section { padding: 16px; position: sticky; top: var(--header-h); background: var(--surface); z-index: 999; border-bottom: 1px solid var(--border-light); }
.search-box {
  display: flex; align-items: center; gap: 10px; background: var(--surface2);
  border-radius: var(--radius-sm); padding: 14px 16px; transition: var(--tr);
}
.search-box:focus-within { background: var(--surface); box-shadow: 0 0 0 2px var(--accent-light); border-color: var(--accent); }
.search-box input { flex: 1; border: none; background: transparent; font-family: inherit; font-size: 0.95rem; font-weight: 500; outline: none; color: var(--text); }
.search-box input::placeholder { color: var(--dim); }

/* ── HERO BANNER (Animated Carousel) ── */
.hero-wrapper { padding: 16px; }
.hero-carousel {
  position: relative; width: 100%; height: 180px; border-radius: var(--radius);
  overflow: hidden; background: var(--surface2);
}
.hero-slide {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 0.8s ease, transform 3s ease; transform: scale(1.05);
}
.hero-slide.active { opacity: 1; transform: scale(1); z-index: 1; }
.hero-overlay {
  position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 100%);
  z-index: 2; display: flex; flex-direction: column; justify-content: center; padding: 24px;
}
.hero-overlay h2 { color: white; font-size: 1.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 8px; max-width: 70%; }
.hero-overlay p { color: rgba(255,255,255,0.9); font-size: 0.85rem; font-weight: 500; }

/* ── CATEGORIES (Bolt Style Horizontal Scroll) ── */
.section { padding: 24px 16px 0; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 1.2rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }
.section-link { font-size: 0.85rem; font-weight: 700; color: var(--accent); cursor: pointer; background: none; border: none; }
.cat-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
.cat-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 72px; cursor: pointer;
}
.cat-icon {
  width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
  background: var(--surface2); color: var(--text-secondary); transition: var(--tr);
}
.cat-icon i { width: 26px; height: 26px; stroke-width: 1.5; }
.cat-item:hover .cat-icon { background: var(--border-light); transform: translateY(-2px); }
.cat-item.active .cat-icon { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(5,150,105,0.3); }
.cat-label { font-size: 0.75rem; font-weight: 600; text-align: center; color: var(--text); }

/* ── PRODUCT CARDS ── */
.products-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
.product-card {
  flex: 0 0 160px; display: flex; flex-direction: column; cursor: pointer; scroll-snap-align: start;
}
.pc-img-wrap {
  width: 100%; aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden;
  background: var(--surface2); position: relative; margin-bottom: 10px; box-shadow: var(--shadow-sm);
}
.pc-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
.product-card:hover .pc-img-wrap img { transform: scale(1.05); }
.pc-no-img { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--dim); opacity: 0.5; }
.pc-badge { position: absolute; top: 8px; left: 8px; background: var(--surface); color: var(--text); font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 100px; box-shadow: var(--shadow); }
.pc-badge.promo { background: var(--accent-light); color: var(--accent-dark); }
.pc-info { display: flex; flex-direction: column; flex: 1; }
.pc-price { font-size: 1rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pc-price-old { font-size: 0.75rem; color: var(--dim); text-decoration: line-through; font-weight: 500; }
.pc-name { font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
.pc-action { margin-top: auto; }
.add-btn {
  width: 100%; padding: 8px; border-radius: var(--radius-pill); background: var(--surface2); color: var(--text);
  border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: var(--tr); display: flex; align-items: center; justify-content: center; gap: 4px;
}
.add-btn:hover { background: var(--border); }
.add-btn:active { transform: scale(0.96); }
.qty-ctrl {
  display: flex; align-items: center; justify-content: space-between; background: var(--accent); color: white;
  border-radius: var(--radius-pill); padding: 4px; box-shadow: 0 4px 12px rgba(5,150,105,0.2);
}
.qty-ctrl button {
  width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.qty-ctrl button:active { background: rgba(255,255,255,0.2); }
.qty-num { font-weight: 700; font-size: 0.85rem; }

/* ── MOBILE BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  display: flex; justify-content: space-around; align-items: center;
  padding: 10px 10px calc(10px + var(--safe)); border-top: 1px solid var(--border-light); z-index: 1000;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--dim); text-decoration: none; font-size: 0.65rem; font-weight: 600; cursor: pointer; position: relative;
}
.nav-item.active { color: var(--accent); }
.nav-item i { width: 24px; height: 24px; }
.nav-badge {
  position: absolute; top: -4px; right: -8px; background: var(--danger); color: white;
  font-size: 0.6rem; padding: 2px 6px; border-radius: 100px; font-weight: 800; border: 2px solid var(--surface); display: none;
}

/* ── ITEM BOTTOM SHEET ── */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; visibility: hidden; transition: var(--tr); }
.backdrop.open { opacity: 1; visibility: visible; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; max-width: var(--max-w); margin: 0 auto;
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; z-index: 2001;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  display: flex; flex-direction: column; max-height: 90vh;
}
@media (min-width: 768px) {
  .sheet { max-width: 500px; right: 20px; left: auto; bottom: 20px; border-radius: var(--radius); box-shadow: var(--shadow-lg); }
}
.sheet.open { transform: translateY(0); }
.sheet-close {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
  border: none; color: white; cursor: pointer; z-index: 10;
}
.sheet-img-wrap { width: 100%; height: 280px; background: var(--surface2); position: relative; }
.sheet-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.sheet-body { padding: 24px; overflow-y: auto; }
.sheet-title { font-size: 1.4rem; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
.sheet-desc { font-size: 0.9rem; color: var(--dim); line-height: 1.5; margin-bottom: 16px; }
.sheet-price { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 24px; }
.sheet-footer { padding: 16px 24px calc(16px + var(--safe)); border-top: 1px solid var(--border-light); background: var(--surface); display: flex; gap: 16px; }
.sheet-qty-ctrl { display: flex; align-items: center; gap: 16px; background: var(--surface2); padding: 8px 16px; border-radius: var(--radius-pill); }
.sheet-qty-ctrl button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); }
.sheet-add-btn { flex: 1; background: var(--accent); color: white; border: none; border-radius: var(--radius-pill); font-weight: 800; font-size: 1rem; cursor: pointer; transition: var(--tr); }
.sheet-add-btn:active { transform: scale(0.98); }

/* ── UTILS & TOAST ── */
#toast { position: fixed; bottom: calc(80px + var(--safe)); left: 50%; transform: translateX(-50%) translateY(100px); background: #111827; color: white; padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 0.85rem; z-index: 9999; transition: var(--tr); box-shadow: var(--shadow-lg); opacity: 0; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="app-container">
  
  <header class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <img src="https://z-p3-scontent.fjnb12-1.fna.fbcdn.net/v/t39.30808-6/473018911_1144016671071744_3535488847925097727_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeGUeW4OMbFgWIHsxc6MEbLfyVanQYIENhfJVqdBggQ2F129W_kY5E8R48hfaupj-VUCWW9pMizIpOYeN0vUh9Jn&_nc_ohc=1lRbXXsrtfAQ7kNvwFtvoR5&_nc_oc=Adrli0V2q-O-3UPm0F-1gYiFmGekmOt_tm7o-KvtBqA1QyvLWeDmxWgdzNPyK4QygxY&_nc_zt=23&_nc_ht=z-p3-scontent.fjnb12-1.fna&_nc_gid=HkCyI20b8-O2ZffqF1z3KQ&oh=00_Af1X6wCxIbBM01jlybOyk4nobvtJlzL5So492N84cD3T2w&oe=69EFE9F3" alt="Logo">
      </div>
      <div class="delivery-info">
        <span class="delivery-label">Delivering to</span>
        <span class="delivery-address">Current Location <i data-lucide="chevron-down" style="width:16px;height:16px;"></i></span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" style="display:none;" id="desktopSearchBtn" onclick="document.getElementById('searchInput').focus()"><i data-lucide="search"></i></button>
      <button class="icon-btn" style="display:none;" id="desktopCartBtn" onclick="toggleCart()">
        <i data-lucide="shopping-bag"></i><span class="cart-badge" id="cartCountDesktop" style="display:none;">0</span>
      </button>

  <div class="search-section" id="searchSectionBar">
    <div class="search-box">
      <i data-lucide="search"></i>
      <input type="text" id="searchInput" placeholder="Search groceries, brands..." autocomplete="off" oninput="handleSearch(this.value)">
    </div>
  </div>

  <main class="page-content">
    <div class="hero-wrapper">
      <div class="hero-carousel">
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=800&q=80" class="hero-slide active">
        <img src="https://images.unsplash.com/photo-1573246123716-6b1782bfc499?auto=format&fit=crop&w=800&q=80" class="hero-slide">
        <img src="https://images.unsplash.com/photo-1604719312566-8912e9227c6a?auto=format&fit=crop&w=800&q=80" class="hero-slide">

        </div>

    <div class="section" id="popularSection" style="display:none;">
      <div class="section-header">
        <div class="section-title">Popular Right Now</div>
      </div>

        </div>
    </div>

    <div class="section" id="searchSection2" style="display:none;">
      <div class="section-header">
        <div class="section-title" id="searchTitle">Results</div>
      </div>
      <div class="products-grid" id="searchGrid"></div>
    </div>

    <div id="aisleContainer"></div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item active" onclick="goHome()"><i data-lucide="house"></i><span>Home</span></a>
    <a class="nav-item" onclick="focusSearch()"><i data-lucide="search"></i><span>Search</span></a>
    <a class="nav-item" onclick="toggleCart()">
      <i data-lucide="shopping-bag"></i><span class="nav-badge" id="navCartBadge">0</span><span>Basket</span>
    </a>
    <a class="nav-item"><i data-lucide="user"></i><span>Profile</span></a>
  </nav>

</div>

<div class="backdrop" id="itemBackdrop" onclick="closeItemSheet()"></div>
<div class="sheet" id="itemSheet">
  <button class="sheet-close" onclick="closeItemSheet()"><i data-lucide="x"></i></button>
  <div class="sheet-img-wrap" id="itemSheetImageWrap"></div>
  <div class="sheet-body">
    <h2 class="sheet-title" id="itemSheetName">Product Name</h2>
    <p class="sheet-desc" id="itemSheetDesc">Description goes here.</p>
    <div class="sheet-price">R<span id="itemSheetPriceVal">0.00</span></div>
  </div>
  <div class="sheet-footer">

      <button onclick="changeSheetQty(-1)"><i data-lucide="minus" style="width:16px;"></i></button>
      <span class="qty-num" id="itemSheetQtyVal" style="font-size:1.1rem;">1</span>
      <button onclick="changeSheetQty(1)"><i data-lucide="plus" style="width:16px;"></i></button>

    <button class="sheet-add-btn" onclick="addFromSheet()">Add to Basket</button>

</div>

<div id="toast">Item added to basket</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
  authDomain: "test-17881.firebaseapp.com",
  databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
  projectId: "test-17881",
  storageBucket: "test-17881.firebasestorage.app",
  messagingSenderId: "1057428047643",
  appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ── CAROUSEL ── */
setInterval(() => {
  const slides = document.querySelectorAll('.hero-slide');
  if(!slides.length) return;
  const active = document.querySelector('.hero-slide.active');
  active.classList.remove('active');
  const next = active.nextElementSibling || slides[0];
  next.classList.add('active');
}, 3000);

/* ── CATEGORIES ── */
const CATS = [
  { key:'all', label:'All', icon:'layout-grid' },
  { key:'fresh', label:'Produce', icon:'leaf' },
  { key:'dairy', label:'Dairy', icon:'milk' },
  { key:'meat', label:'Meat', icon:'drumstick' },
  { key:'bakery', label:'Bakery', icon:'croissant' },
  { key:'beverages', label:'Drinks', icon:'cup-soda' },
  { key:'snacks', label:'Snacks', icon:'cookie' },
  { key:'frozen', label:'Frozen', icon:'snowflake' },
  { key:'pantry', label:'Pantry', icon:'archive' },
  { key:'household', label:'Home', icon:'spray-can' }
];

const CAT_MAP = {'Fruits & Veg':'fresh', 'Dairy':'dairy', 'Meat':'meat', 'Bakery':'bakery', 'Frozen':'frozen', 'Pantry':'pantry', 'Snacks':'snacks', 'Beverages':'beverages', 'Household':'household'};
function getCatKey(c){ return CAT_MAP[c] || 'pantry'; }

let allProducts = [], cartGroups = {}, activeCat = 'all', currentUser = null, activeSheetProduct = null, sheetQty = 1;

window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

/* ── LOAD DATA ── */
onValue(ref(db,'vendors'), snap=>{
  allProducts = [];
  const data = snap.val();
  if(!data) return;
  Object.entries(data).forEach(([vid,v])=>{
    if((v.storeType||'').toLowerCase() !== 'grocery' || v.status !== 'active' || !v.menu) return;
    Object.entries(v.menu).forEach(([pid, item])=>{
      allProducts.push({
        id: `${vid}_${pid}`, vendorId: vid, vendorName: v.name,
        name: item.name, price: parseFloat(item.price||0),
        originalPrice: item.originalPrice ? parseFloat(item.originalPrice) : null,
        category: item.category || 'Other', imageURL: item.imageURL || '',
        description: item.description || '', status: item.status || 'available',
        featured: item.featured === true || item.featured === 'true'
      });
    });
  });
  renderUI();
});

function renderUI() {
  // Build Cat Bar
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(c => `
    <div class="cat-item ${activeCat===c.key?'active':''}" onclick="selectCat('${c.key}')">
      <div class="cat-icon"><i data-lucide="${c.icon}"></i></div>
      <span class="cat-label">${c.label}</span>
    </div>
  `).join('');
  
  renderAisles('all');
  renderPopular();
  lucide.createIcons();
}

window.selectCat = (key) => {
  activeCat = key;
  document.getElementById('searchSection2').style.display = 'none';
  document.getElementById('aisleContainer').style.display = '';
  renderUI();
};

function renderPopular() {
  const featured = allProducts.filter(p=>p.featured).slice(0,10);
  document.getElementById('popularSection').style.display = featured.length ? '' : 'none';
  const row = document.getElementById('popularRow');
  row.innerHTML = featured.map(p=>buildCardHTML(p)).join('');
}

function renderAisles(catKey) {
  const cont = document.getElementById('aisleContainer');
  let filtered = catKey === 'all' ? allProducts : allProducts.filter(p=>getCatKey(p.category)===catKey);
  
  if(catKey === 'all') {
    const groups = {};
    filtered.forEach(p=>{ const k=getCatKey(p.category); if(!groups[k]) groups[k]=[]; groups[k].push(p); });
    cont.innerHTML = CATS.filter(c=>c.key!=='all' && groups[c.key]).map(cat => `
      <div class="section">
        <div class="section-header"><div class="section-title">${cat.label}</div><button class="section-link" onclick="selectCat('${cat.key}')">See all</button></div>
        <div class="products-row noscroll">${groups[cat.key].slice(0,8).map(p=>buildCardHTML(p)).join('')}</div>
      </div>
    `).join('');
  } else {
    cont.innerHTML = `
      <div class="section">
        <div class="section-header"><div class="section-title">${CATS.find(c=>c.key===catKey).label}</div></div>
        <div class="products-grid">${filtered.map(p=>buildCardHTML(p)).join('')}</div>
      </div>`;
  }
}

function buildCardHTML(product) {
  const qty = getProductQuantity(product.id);
  const img = product.imageURL ? `<img src="${product.imageURL}" loading="lazy">` : `<div class="pc-no-img"><i data-lucide="image"></i></div>`;
  const badge = product.featured ? `<div class="pc-badge promo">Popular</div>` : '';
  const oldP = product.originalPrice ? `<span class="pc-price-old">R${product.originalPrice.toFixed(2)}</span>` : '';
  
  let actionHtml = `<button class="add-btn" onclick="event.stopPropagation(); addItem('${product.id}')"><i data-lucide="plus" style="width:16px;"></i> Add</button>`;
  if(qty > 0) {
    actionHtml = `<div class="qty-ctrl">
      <button onclick="event.stopPropagation(); updateItemQty('${product.id}', -1)"><i data-lucide="minus"></i></button>
      <span class="qty-num">${qty}</span>
      <button onclick="event.stopPropagation(); updateItemQty('${product.id}', 1)"><i data-lucide="plus"></i></button>
    </div>`;
  }

  return `
    <div class="product-card" onclick="openItemSheet('${product.id}')">
      <div class="pc-img-wrap">${img}${badge}</div>
      <div class="pc-info">
        <div class="pc-price">R${product.price.toFixed(2)} ${oldP}</div>
        <div class="pc-name">${product.name}</div>
        <div class="pc-action" id="act-${product.id}">${actionHtml}</div>
      </div>
    </div>`;
}

/* ── CART LOGIC ── */
function getProductQuantity(id) {
  for(const g of Object.values(cartGroups)) {
    const i = g.items.find(x=>x.id===id); if(i) return i.quantity;
  } return 0;
}

window.addItem = (id) => {
  const p = allProducts.find(x=>x.id===id); if(!p) return;
  if(!cartGroups[p.vendorId]) cartGroups[p.vendorId] = { vendorId: p.vendorId, items: [] };
  cartGroups[p.vendorId].items.push({...p, quantity: 1});
  updateCartState(); showToast("Added to basket");
};

window.updateItemQty = (id, delta) => {
  for(const vid in cartGroups) {
    const idx = cartGroups[vid].items.findIndex(x=>x.id===id);
    if(idx !== -1) {
      cartGroups[vid].items[idx].quantity += delta;
      if(cartGroups[vid].items[idx].quantity <= 0) cartGroups[vid].items.splice(idx, 1);
      if(cartGroups[vid].items.length === 0) delete cartGroups[vid];
      break;
    }
  }
  updateCartState();
};

function updateCartState() {
  const total = Object.values(cartGroups).reduce((s,g)=>s+g.items.reduce((ss,i)=>ss+i.quantity,0),0);
  const badge = document.getElementById('navCartBadge');
  const dBadge = document.getElementById('cartCountDesktop');
  
  if(total > 0) {
    badge.style.display = 'block'; badge.textContent = total;
    if(dBadge){ dBadge.style.display = 'block'; dBadge.textContent = total; }
  } else {
    badge.style.display = 'none';
    if(dBadge) dBadge.style.display = 'none';
  }
  renderUI(); // Re-render to update +/- buttons on cards
}

/* ── SHEET LOGIC ── */
window.openItemSheet = (id) => {
  const p = allProducts.find(x=>x.id===id); if(!p) return;
  activeSheetProduct = p; sheetQty = Math.max(1, getProductQuantity(id));
  document.getElementById('itemSheetName').textContent = p.name;
  document.getElementById('itemSheetDesc').textContent = p.description || 'Fresh and delicious.';
  document.getElementById('itemSheetPriceVal').textContent = p.price.toFixed(2);
  document.getElementById('itemSheetImageWrap').innerHTML = p.imageURL ? `<img src="${p.imageURL}">` : '';
  
  document.getElementById('itemSheetQtyVal').textContent = sheetQty;
  document.getElementById('itemBackdrop').classList.add('open');
  document.getElementById('itemSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeItemSheet = () => {
  document.getElementById('itemBackdrop').classList.remove('open');
  document.getElementById('itemSheet').classList.remove('open');
  document.body.style.overflow = ''; activeSheetProduct = null;
};

window.changeSheetQty = (delta) => {
  sheetQty = Math.max(1, sheetQty + delta);
  document.getElementById('itemSheetQtyVal').textContent = sheetQty;
};

window.addFromSheet = () => {
  const p = activeSheetProduct;
  const currentQty = getProductQuantity(p.id);
  const diff = sheetQty - currentQty;
  if(diff > 0) {
    if(!cartGroups[p.vendorId]) cartGroups[p.vendorId] = { items: [] };
    const ex = cartGroups[p.vendorId].items.find(x=>x.id===p.id);
    if(ex) ex.quantity += diff; else cartGroups[p.vendorId].items.push({...p, quantity: sheetQty});
  } else if(diff < 0) {
    updateItemQty(p.id, diff);
  }
  updateCartState(); closeItemSheet(); showToast("Basket updated");
};

/* ── NAV & SEARCH ACTIONS ── */
window.goHome = () => { selectCat('all'); window.scrollTo({top:0, behavior:'smooth'}); };
window.focusSearch = () => { document.getElementById('searchInput').focus(); window.scrollTo({top:0}); };
window.toggleCart = () => { showToast("Cart opening..."); /* Tie to your existing checkout logic here */ };

window.handleSearch = (q) => {
  const query = q.trim().toLowerCase();
  if(!query) { selectCat(activeCat); return; }
  const res = allProducts.filter(p=>p.name.toLowerCase().includes(query));
  document.getElementById('aisleContainer').style.display = 'none';
  document.getElementById('catSection').style.display = 'none';
  document.getElementById('popularSection').style.display = 'none';
  document.getElementById('searchSection2').style.display = '';
  document.getElementById('searchGrid').innerHTML = res.map(p=>buildCardHTML(p)).join('');
  lucide.createIcons();
};

/* Media Query Setup for Desktop Header Actions */
if(window.innerWidth > 768) {
  document.getElementById('desktopSearchBtn').style.display = 'flex';
  document.getElementById('desktopCartBtn').style.display = 'flex';
}

lucide.createIcons();
</script>
